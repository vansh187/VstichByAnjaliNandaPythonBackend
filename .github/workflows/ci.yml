name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vstitch_ci
          POSTGRES_PASSWORD: vstitch_ci_password
          POSTGRES_DB: vstitch_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vstitch_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://vstitch_ci:vstitch_ci_password@localhost:5432/vstitch_ci
      JWT_SECRET: ci-test-secret-not-for-production
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      RUN_API_INTEGRATION_TESTS: "1"

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Verify the app imports and boots cleanly
        run: python -c "import main; print('main imported OK, routes:', [r.path for r in main.app.routes if hasattr(r, 'path')])"

      - name: Run test suite
        run: pytest -v
